<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="widgth=device-width, initial-scale=1.0" />
    <title>Dwello</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-primary-light: var(--color-primary-light);
        --color-primary: var(--color-primary);
        --color-primary-dark: var(--color-primary-dark);
        --color-light: var(--color-light);
        --color-gradient-primary: var(--gradient-primary);
        --color-gradient-light: var(--gradient-light);
      }

      @layer base {
        :root {
          --color-primary-light: #4c00aa;
          --color-primary: #3b1b71;
          --color-primary-dark: #10004f;
          --color-light: #fbdcff;
          --gradient-primary: linear-gradient(
            180deg,
            var(--color-primary-light),
            var(--color-primary),
            var(--color-primary-dark)
          );
          --gradient-light: linear-gradient(
            90deg,
            var(--color-light),
            var(--color-primary-light)
          );
        }

        html,
        body {
          margin: 0;
          padding: 0;
          min-height: 100dvh;
        }

        body {
          background: var(--gradient-primary);
        }
      }

      @layer utilities {
        .text-gradient-light {
          background: var(--gradient-light);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        .glass {
          background: rgba(255, 255, 255, 0.08);
          backdrop-filter: blur(15px);
          border: 0.5px solid var(--color-light);
        }

        .glass:hover {
          background: rgba(255, 255, 255, 0.12);
          box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }
      }

      @layer components {
        .btn-primary {
          padding: 0.75rem 1.5rem;
          border-radius: 5px;
          transition: all 0.3s ease;
          cursor: pointer;
        }
        .card-primary {
          padding: 2rem;
          transition: all 0.3s ease;
          border-radius: 5px;
        }
      }
    </style>
  </head>

  <body>
    <div id="slot-navbar"></div>
    <div id="slot-hero"></div>
    <div id="slot-location"></div>
    <div id="slot-help"></div>
    <div id="slot-why"></div>
    <div id="slot-residences"></div>
    <div id="slot-testimonials"></div>
    <div id="slot-faq"></div>
    <div id="slot-footer"></div>

    <script>
      const sections = [
        { slot: "slot-navbar", file: "./01-navbar.html" },
        { slot: "slot-hero", file: "./02-3-hero.html" },
        { slot: "slot-location", file: "./02-6-location-signup.html" },
        { slot: "slot-help", file: "./03-3-we-help.html" },
        { slot: "slot-why", file: "./03-6-why-choose-us.html" },
        { slot: "slot-residences", file: "./04-residences.html" },
        { slot: "slot-testimonials", file: "./05-testimonials.html" },
        { slot: "slot-faq", file: "./06-faq-contact.html" },
        { slot: "slot-footer", file: "./07-footer.html" },
      ];

      // this allows editing child html without scrolling to bottom
      window.addEventListener("beforeunload", () => {
        sessionStorage.setItem("scrollY", window.scrollY);
      });

      Promise.all(
        sections.map(({ slot, file }) =>
          fetch(file)
            .then((r) => r.text())
            .then((html) => {
              document.getElementById(slot).innerHTML = html;
            })
            .catch(() => {
              document.getElementById(slot).innerHTML =
                `<p class="p-4 text-red-500">Failed to load ${file}</p>`;
            }),
        ),
      ).then(() => {
        const y = sessionStorage.getItem("scrollY");
        if (y) window.scrollTo({ top: parseInt(y), behavior: "instant" });
      });
    </script>
  </body>
</html>
