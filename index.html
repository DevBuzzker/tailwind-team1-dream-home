<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="widgth=device-width, initial-scale=1.0" />
    <title>Dwello</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style type="text/tailwindcss">
      @theme {
        --color-primary-light: #4c00aa;
        --color-primary: #3b1b71;
        --color-primary-dark: #10004f;
        --color-light: #fbdcff;
        --color-gradient-primary: linear-gradient(
          180deg,
          var(--color-primary-light),
          var(--color-primary),
          var(--color-primary-dark),
          var(--color-primary),
          var(--color-primary-light),
          var(--color-primary),
          var(--color-primary-dark)
        );
        --color-gradient-light: linear-gradient(90deg, var(--color-light), var(--color-primary-light));
      }

      @layer base {
        body {
          background: var(--color-gradient-primary);
          font-family: "Montserrat", sans-serif;
        }
      }

      @layer utilities {
        .text-gradient-light {
          background: var(--color-gradient-light);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        .glass {
          background: rgb(255 255 255 / 0.1);
          backdrop-filter: blur(24px);
          border: 1px solid rgb(255 255 255 / 0.1);
          transition: all 0.2s ease;
          box-shadow:
            inset 0 1px 1px rgb(255 255 255 / 0.15),
            0 6px 20px rgb(0 0 0 / 0.2);
        }

        .glass:hover {
          background: rgb(255 255 255 / 0.2);
          transform: translateY(-4px);
        }
      }

      @layer components {
        .btn-primary {
          padding: 0.75rem 1.5rem;
          border-radius: 5px;
          transition: all 0.3s ease;
          cursor: pointer;
        }
        .card-primary {
          padding: 2rem;
          transition: all 0.3s ease;
          border-radius: 5px;
        }
      }
    </style>
  </head>

  <body>
    <div id="slot-navbar"></div>
    <div id="slot-hero"></div>
    <div id="slot-location"></div>
    <div id="slot-help"></div>
    <div id="slot-why"></div>
    <div id="slot-residences"></div>
    <div id="slot-testimonials"></div>
    <!-- <div id="slot-faq"></div> -->
    <div id="slot-footer"></div>

    <script>
      const sections = [
        { slot: "slot-navbar", file: "./01-navbar.html" },
        { slot: "slot-hero", file: "./02-3-hero.html" },
        { slot: "slot-location", file: "./02-6-location-signup.html" },
        { slot: "slot-help", file: "./03-3-we-help.html" },
        { slot: "slot-why", file: "./03-6-why-choose-us.html" },
        { slot: "slot-residences", file: "./04-residences.html" },
        { slot: "slot-testimonials", file: "./05-testimonials.html" },
        // { slot: "slot-faq", file: "./06-faq-contact.html" },
        { slot: "slot-footer", file: "./07-footer.html" },
      ];

      // this allows editing child html without scrolling to bottom
      window.addEventListener("beforeunload", () => {
        sessionStorage.setItem("scrollY", window.scrollY);
      });

      Promise.all(
        sections.map(({ slot, file }) =>
          fetch(file)
            .then((r) => r.text())
            .then((html) => {
              document.getElementById(slot).innerHTML = html;
            })
            .catch(() => {
              document.getElementById(slot).innerHTML = `<p class="p-4 text-red-500">Failed to load ${file}</p>`;
            }),
        ),
      ).then(() => {
        const y = sessionStorage.getItem("scrollY");
        if (y) window.scrollTo({ top: parseInt(y), behavior: "instant" });
        createTestimonialsCarousel();
      });

      function createTestimonialsCarousel() {
        const carousel = document.querySelector(".testimonials-carousel");
        const carouselViewport = carousel.querySelector(".carousel-viewport");
        let carouselWidth = carouselViewport.clientWidth;
        const btnNext = carousel.querySelector(".btn-next");
        const btnPrev = carousel.querySelector(".btn-prev");

        if (!carouselViewport || !btnNext || !btnPrev) {
          console.warn("Carousel missing required elements");
          return;
        }

        btnNext.addEventListener("click", () => {
          const currentScroll = carouselViewport.scrollLeft;
          const nextScroll = currentScroll + carouselWidth;
          carouselViewport.scrollTo({
            left: nextScroll,
            behavior: "smooth",
          });
        });

        btnPrev.addEventListener("click", () => {
          const currentScroll = carouselViewport.scrollLeft;
          const nextScroll = currentScroll - carouselWidth;
          carouselViewport.scrollTo({
            left: nextScroll,
            behavior: "smooth",
          });
        });

        window.addEventListener("resize", () => {
          carouselWidth = carouselViewport.clientWidth;
        });
      }

      // Dropdown logic for location, type, and price filters

      document.addEventListener("DOMContentLoaded", () => {
        function toggle(type) {
          const menus = ["location", "type", "price"];

          menus.forEach((m) => {
            const el = document.getElementById(m + "Menu");
            if (el && m !== type) el.classList.add("hidden");
          });

          const current = document.getElementById(type + "Menu");
          if (current) current.classList.toggle("hidden");
        }

        function select(type, value) {
          const text = document.getElementById(type + "Text");
          const menu = document.getElementById(type + "Menu");

          if (text) text.innerText = value;
          if (menu) menu.classList.add("hidden");
        }

        window.toggle = toggle;
        window.select = select;

        document.addEventListener("click", function (e) {
          if (!e.target.closest(".relative")) {
            ["locationMenu", "typeMenu", "priceMenu"].forEach((id) => {
              const el = document.getElementById(id);
              if (el) el.classList.add("hidden");
            });
          }
        });
      });
    </script>
  </body>
</html>
